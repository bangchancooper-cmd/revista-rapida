<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Preview - Revista Rápida</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 40px 20px;
            font-family: 'Montserrat', sans-serif;
            background: #f5f5f5;
        }
        .preview-wrapper {
            max-width: 900px;
            margin: 0 auto;
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 4px 30px rgba(0,0,0,0.1);
            overflow: hidden;
            padding: 20px;
        }
    </style>
</head>
<body>
    <div class="preview-wrapper">
        {{ html_content | safe }}
    </div>
</body>
</html>
